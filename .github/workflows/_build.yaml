name: "Base build"

on:
  workflow_call:
    outputs:
      version:
        description: "Version of the build"
        value: ${{ jobs.build.outputs.version }}
  workflow_dispatch:
    inputs:
      Reason:
        description: "Reason for the build"

jobs:
  build:
    outputs:
      version: ${{ steps.vsix_version.outputs.SimpleVersion }}
    name: Build
    runs-on: windows-2022
    env:
      PROJECT_PATH: "src\\vs-endpoint.csproj"
      VSIX_MANIFEST_PATH: "src\\source.extension.vsixmanifest"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version stamping
        id: vsix_version
        uses: dotnet/nbgv@v0.4
        with:
          setAllVars: true

      - name: Setup build dependencies
        uses: timheuer/bootstrap-dotnet@v1
        with:
          nuget: "false"
          sdk: "false"
          msbuild: "true"

      - name: Increment VSIX version
        id: vsix_version_stamp
        uses: timheuer/vsix-version-stamp@v2
        with:
          manifest-file: ${{ env.VSIX_MANIFEST_PATH }}
          version-number: ${{ steps.vsix_version.outputs.SimpleVersion }}

      - name: Build
        run: msbuild ${{ env.PROJECT_PATH }} /p:Configuration=Release /v:m -restore /p:OutDir=_built\\ -bl

      - name: Upload msbuild binlog
        uses: actions/upload-artifact@v4
        with:
          name: msbuild.binlog
          path: msbuild.binlog

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}.vsix
          path: src/_built/**/*.vsix

